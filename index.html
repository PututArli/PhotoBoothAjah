<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PhotoBoothAjah</title>
<script>
    if (/Android/i.test(navigator.userAgent)) document.documentElement.classList.add('android');
</script>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <p>Memuat Kamera...</p>
</div>

<button id="btn-open-gallery" class="floating-gallery-btn">
    <i class="ph ph-images"></i>
    <span id="gallery-badge" class="badge hidden">0</span>
</button>

<div class="app">
    <main class="camera-area">
        <div class="camera-wrap">
            <video id="video" autoplay playsinline muted></video>
            <button id="btn-switch-cam" class="switch-cam-btn">
                <i class="ph ph-camera-rotate"></i>
            </button>
            <div id="flash-overlay"></div>
            <div id="countdown-overlay"><span id="countdown-num"></span></div>
            <div id="photo-counter" class="photo-counter hidden">
                <span id="counter-text">1 / 3</span>
            </div>
            <button id="btn-cancel-session" class="cancel-session-btn"><i class="ph ph-x"></i> Batal</button>
            <div class="capture-preview-container">
                <canvas id="capture-preview-canvas"></canvas>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-head">
            <img src="logo.png" alt="Logo" class="app-logo">
            <h1>PhotoBoothAjah</h1>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="adjust"><i class="ph ph-sliders"></i> Adjust</button>
            <button class="tab" data-tab="color"><i class="ph ph-palette"></i> Color</button>
            <button class="tab" data-tab="layout"><i class="ph ph-squares-four"></i> Layout</button>
            <button class="tab" data-tab="custom"><i class="ph ph-magic-wand"></i> Custom</button>
        </div>

        <div class="tab-body">
            <div class="panel active" id="panel-adjust">
                <label class="section-label">Pilih Kamera</label>
                <div class="custom-select-wrap" style="margin-bottom: 20px;">
                    <select id="camera-select" class="custom-select">
                        <option value="">Memuat kamera...</option>
                    </select>
                </div>

                <label class="section-label">Pencerahan (Brightness)</label>
                <input type="range" class="slider" id="adj-bright" min="50" max="150" value="100">
                
                <label class="section-label">Kontras (Contrast)</label>
                <input type="range" class="slider" id="adj-contrast" min="50" max="150" value="100">
                
                <label class="section-label">Saturasi (Saturation)</label>
                <input type="range" class="slider" id="adj-sat" min="0" max="200" value="100">
                
                <label class="section-label">Kehangatan (Warmth)</label>
                <input type="range" class="slider" id="adj-warm" min="0" max="100" value="0">
                <button id="reset-adjust" class="btn-sm" style="margin-top:8px;"><i class="ph ph-arrow-counter-clockwise"></i> Reset</button>
            </div>

            <div class="panel" id="panel-color">
                <label class="section-label">Efek Warna</label>
                <div class="option-grid cols-2" id="color-list"></div>
            </div>

            <div class="panel" id="panel-layout">
                <label class="section-label">Layout Hasil</label>
                <div class="option-grid cols-2">
                    <button class="opt-btn active" data-layout="strip3">Strip 3 foto</button>
                    <button class="opt-btn" data-layout="strip4">Strip 4 foto</button>
                    <button class="opt-btn" data-layout="grid2x2">Grid 2×2</button>
                    <button class="opt-btn" data-layout="single">Single</button>
                </div>

                <label class="section-label" style="margin-top:20px">Jumlah Foto per Sesi</label>
                <div class="option-grid cols-3">
                    <button class="opt-btn active" data-session-count="3">3 foto</button>
                    <button class="opt-btn" data-session-count="4">4 foto</button>
                    <button class="opt-btn" data-session-count="5">5 foto</button>
                    <button class="opt-btn" data-session-count="2">2 foto</button>
                    <button class="opt-btn" data-session-count="6">6 foto</button>
                    <button class="opt-btn" data-session-count="1">1 foto</button>
                </div>

                <label class="section-label" style="margin-top:20px">Timer per foto</label>
                <div class="option-grid cols-3">
                    <button class="opt-btn active" data-timer="3">3 detik</button>
                    <button class="opt-btn" data-timer="5">5 detik</button>
                    <button class="opt-btn" data-timer="10">10 detik</button>
                </div>
            </div>

            <div class="panel" id="panel-custom">
                <label class="section-label">Tema Frame</label>
                <div class="swatch-row">
                    <button class="swatch active" data-bg="solid" data-val="#ffffff" style="background:#fff"></button>
                    <button class="swatch" data-bg="solid" data-val="#0a0a0a" style="background:#0a0a0a"></button>
                    <button class="swatch" data-bg="gradient" data-val="#ff9a9e,#fecfef" style="background:linear-gradient(135deg, #ff9a9e, #fecfef)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#a18cd1,#fbc2eb" style="background:linear-gradient(135deg, #a18cd1, #fbc2eb)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#84fab0,#8fd3f4" style="background:linear-gradient(135deg, #84fab0, #8fd3f4)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#ffecd2,#fcb69f" style="background:linear-gradient(135deg, #ffecd2, #fcb69f)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#4facfe,#00f2fe" style="background:linear-gradient(135deg, #4facfe, #00f2fe)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#f6d365,#fda085" style="background:linear-gradient(135deg, #f6d365, #fda085)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#a8edea,#fed6e3" style="background:linear-gradient(135deg, #a8edea, #fed6e3)"></button>
                    <button class="swatch" data-bg="gradient" data-val="#30cfd0,#330867" style="background:linear-gradient(135deg, #30cfd0, #330867)"></button>
                    <button class="swatch" data-bg="pattern" data-val="polka" style="background: radial-gradient(#ff007f 15%, transparent 16%) 0 0, radial-gradient(#ff007f 15%, transparent 16%) 8px 8px, #fff; background-size:16px 16px"></button>
                    <button class="swatch" data-bg="pattern" data-val="grid" style="background: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 8px 8px; background-color: #fff;"></button>
                    <button class="swatch" data-bg="pattern" data-val="check" style="background: repeating-conic-gradient(#fff 0% 25%, #f1f1f1 0% 50%); background-size: 16px 16px;"></button>
                    <label class="swatch custom-sw"><input type="color" id="custom-color" value="#ffffff"><span><i class="ph ph-plus"></i></span></label>
                </div>

                <label class="section-label" style="margin-top:20px">Gaya Bingkai Foto</label>
                <div class="option-grid cols-3">
                    <button class="opt-btn active" data-border="plain">Polos</button>
                    <button class="opt-btn" data-border="polaroid">Polaroid</button>
                    <button class="opt-btn" data-border="film">Film</button>
                    <button class="opt-btn" data-border="tape">Washi Tape</button>
                    <button class="opt-btn" data-border="neon">Neon Glow</button>
                    <button class="opt-btn" data-border="elegant">Elegant</button>
                    <button class="opt-btn special-border-btn" data-border="christmas">Natal</button>
                    <button class="opt-btn special-border-btn" data-border="halloween">Halloween</button>
                    <button class="opt-btn special-border-btn" data-border="newyear">Tahun Baru</button>
                    <button class="opt-btn special-border-btn" data-border="birthday">Ulang Tahun</button>
                    <button class="opt-btn special-border-btn" data-border="romantic">Romantis</button>
                    <button class="opt-btn special-border-btn" data-border="summer">Summer</button>
                    <button class="opt-btn special-border-btn" data-border="sakura">Sakura</button>
                    <button class="opt-btn special-border-btn" data-border="galaxy">Galaxy</button>
                    <button class="opt-btn special-border-btn" data-border="retro">Retro 80s</button>
                    <button class="opt-btn special-border-btn" data-border="nature">Nature</button>
                    <button class="opt-btn special-border-btn" data-border="magic">Magic</button>
                </div>

                <label class="section-label" style="margin-top:20px">Teks di Frame</label>
                <input type="text" id="custom-text" placeholder="Nama / Event / Tanggal..." maxlength="35">

                <div class="toggle-row">
                    <span>Tampilkan tanggal</span>
                    <label class="toggle"><input type="checkbox" id="show-date" checked><span></span></label>
                </div>
            </div>
        </div>

        <div class="sidebar-foot">
            <div class="preview-panel">
                <div class="preview-panel-head">
                    <div>
                        <span class="preview-label">Preview Live</span>
                        <p class="preview-hint">Menampilkan layout, frame, dan warna yang sedang kamu pilih.</p>
                    </div>
                </div>
                <div class="preview-scroll-container">
                    <canvas id="session-preview"></canvas>
                </div>
            </div>
            <button id="start-btn" class="capture-btn" disabled><i class="ph ph-camera"></i> MULAI SESI</button>
        </div>
    </aside>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-box">
        <button id="modal-close" class="modal-x">&times;</button>
        <h2>Hasil Foto 🎉</h2>
        <div class="result-wrap"><canvas id="result-canvas"></canvas></div>
        <div class="modal-foot">
            <div class="modal-btns" style="width:100%; justify-content:center;">
                <button id="btn-retake" class="btn-outline"><i class="ph ph-arrow-counter-clockwise"></i> Buang</button>
                <button id="btn-save-gallery" class="btn-fill"><i class="ph ph-floppy-disk"></i> Simpan ke Galeri</button>
                <a id="btn-download" class="btn-fill" style="background:var(--accent); color:#fff"><i class="ph ph-download-simple"></i> Unduh</a>
            </div>
        </div>
    </div>
</div>

<div id="gallery-modal" class="modal hidden">
    <div class="modal-box" style="max-width: 800px; max-height: 85vh;">
        <button id="gallery-close" class="modal-x">&times;</button>
        <h2><i class="ph ph-images"></i> Galeri Sesi</h2>
        <div class="gallery-grid" id="gallery-grid">
            <p class="muted-text" style="grid-column: 1 / -1; text-align: center; width: 100%;">Belum ada foto yang disimpan.</p>
        </div>
    </div>
</div>

<div id="gallery-view-modal" class="modal hidden" style="z-index: 1005;">
    <div class="modal-box" style="padding: 16px; max-width: 90vw;">
        <button id="gallery-view-close" class="modal-x" style="top: 8px; right: 8px;">&times;</button>
        <div style="text-align:center; margin-bottom: 16px; margin-top:20px;">
            <img id="gallery-view-img" src="" style="max-width: 100%; max-height: 60vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        </div>
        <div class="modal-btns" style="justify-content: center; width: 100%;">
            <button id="btn-gallery-delete" class="btn-outline" style="color: #f87171; border-color: #f87171;"><i class="ph ph-trash"></i> Hapus</button>
            <a id="btn-gallery-download" class="btn-fill" style="background:var(--accent); color:#fff"><i class="ph ph-download-simple"></i> Unduh Foto</a>
        </div>
    </div>
</div>

<script src="js/shared/composition.js"></script>
<script src="js/shared/audio.js"></script>
<script src="script.js"></script>
</body>
</html>
